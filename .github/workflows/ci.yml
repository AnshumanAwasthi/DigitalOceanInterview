name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  JWT_SECRET_KEY: test-secret-key-at-least-32-chars-long
  JWT_ALGORITHM: HS256
  DATABASE_URL: sqlite:///./test-ci.db
  REDIS_STREAM_NAME: events
  REDIS_CONSUMER_GROUP: event-deliverers
  REDIS_CONSUMER_NAME: worker-1
  CONSUMER_ENABLED: "false"
  WEBHOOK_TIMEOUT_SECONDS: "10"
  WEBHOOK_MAX_RETRIES: "3"
  WEBHOOK_RETRY_BASE_SECONDS: "1"
  WEBHOOK_RETRY_MAX_SECONDS: "30"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m "not integration" -v

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest -m integration -v
